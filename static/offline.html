<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sh'elah Offline</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: Georgia, "Times New Roman", serif;
            background: radial-gradient(circle at 20% 20%, #e2e8f0 0%, transparent 45%), #f8fafc;
            color: #0f172a;
        }

        .card {
            max-width: 32rem;
            margin: 1rem;
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            padding: 1.5rem;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin-top: 0;
            color: #002147;
            font-size: 1.6rem;
        }

        p {
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }
    </style>
</head>

<body>
    <section class="card">
        <h1>Sh'elah is offline</h1>
        <p>Your network connection is unavailable. Cached pages remain accessible when possible.</p>
        <p>Reconnect and refresh to restore live sources and synchronized study data.</p>
    </section>
</body>

</html>
