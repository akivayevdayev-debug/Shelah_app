[pytest]
testpaths = tests
asyncio_mode = auto
# Coverage target is backend/ only — app.py is a 5k-line migration candidate, not the unit target.
# Threshold starts at 15% (Phase 2.6 baseline); raise toward 85% as route tests are filled in.
addopts = --cov=backend --cov-report=term-missing --cov-fail-under=15 -q
