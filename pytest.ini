[pytest]
testpaths = tests
asyncio_mode = auto
# Coverage target is backend/ only — app.py is a 5k-line migration candidate, not the unit target.
# Threshold raised as route/cache/helper tests landed (Stage 7); actual sits near 65%, target remains 85%.
addopts = --cov=backend --cov-report=term-missing --cov-fail-under=60 -q
